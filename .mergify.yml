queue_rules:
  - name: Main
    update_method: merge
    batch_max_wait_time: 5 m
    merge_conditions:
      - and:
          - check-success = continuous-integration/travis-ci
merge_protections:
  - name: Check title
    if:
      - base = main
    success_conditions:
      - "title ~=
        ^(fix|feat|docs|style|refactor|perf|test|build|ci|chore|revert)(?:(.+))\
        ?:"
merge_protections_settings:
  reporting_method: check-runs
